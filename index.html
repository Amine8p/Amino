<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎁 عيد ميلاد محمد أمين كشيدي | 17 سنة 🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', 'El Messiri', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 30%, #1e1a2e, #0b0914);
      overflow: hidden;
      position: relative;
      perspective: 1200px;
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255, 215, 0, 0.7);
      border-radius: 50%;
      box-shadow: 0 0 15px gold;
      animation: floatParticle 8s infinite ease-in-out;
      opacity: 0;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      90% { opacity: 0.1; }
      100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
    }

    .container {
      width: 100%;
      max-width: 550px;
      padding: 20px;
      position: relative;
      z-index: 10;
      transform-style: preserve-3d;
    }

    .card {
      background: rgba(20, 20, 40, 0.45);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50px;
      padding: 40px 25px;
      box-shadow: 
        0 30px 50px rgba(0, 0, 0, 0.7),
        inset 0 0 25px rgba(255, 215, 0, 0.25),
        0 0 0 2px rgba(255, 255, 255, 0.15);
      text-align: center;
      color: white;
      transform: rotateY(0deg) rotateX(5deg);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      transform-style: preserve-3d;
    }

    .card:hover {
      transform: rotateY(2deg) rotateX(3deg) scale(1.01);
      box-shadow: 
        0 40px 60px rgba(0,0,0,0.8),
        inset 0 0 35px rgba(255,215,0,0.4),
        0 0 0 2px rgba(255,255,255,0.25);
    }

    .login-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffd966, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 25px rgba(255,200,0,0.5);
    }

    .login-sub {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 25px;
      color: #e0e0ff;
    }

    .input-wrapper {
      position: relative;
      margin: 20px 0 15px;
      transform-style: preserve-3d;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 25px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 1.2rem;
      text-align: center;
      outline: 2px solid rgba(255, 215, 0, 0.4);
      letter-spacing: 3px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transform: translateZ(8px);
    }

    .input-wrapper input:focus {
      outline: 2px solid gold;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
      transform: translateZ(15px);
    }

    .btn-3d {
      padding: 16px 35px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(145deg, #ff4d6d, #c9184a);
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 
        0 15px 0 #800f2f,
        0 15px 30px rgba(0,0,0,0.5),
        0 0 25px rgba(255,77,109,0.6);
      transition: all 0.15s ease;
      transform: translateZ(12px);
      letter-spacing: 2px;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .btn-3d:hover {
      background: linear-gradient(145deg, #ff6b81, #e63950);
      box-shadow: 0 18px 0 #6b0f21, 0 18px 35px rgba(0,0,0,0.6), 0 0 40px #ff4d6d;
      transform: translateZ(15px) scale(1.02);
    }

    .btn-3d:active {
      transform: translateZ(5px) translateY(6px);
      box-shadow: 0 8px 0 #4a0a16, 0 12px 25px rgba(0,0,0,0.6);
    }

    #surprise {
      display: none;
      animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .cats-meme-gallery {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      transform-style: preserve-3d;
    }

    .cat-meme {
      width: 85px;
      height: 85px;
      border-radius: 30px;
      object-fit: cover;
      border: 3px solid gold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 25px rgba(255,215,0,0.7);
      transform: translateZ(15px);
      transition: all 0.3s ease;
      background: #2a1e3a;
    }

    .cat-meme:hover {
      transform: translateZ(30px) scale(1.2);
      border-color: #ffaa00;
    }

    .birthday-title {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #f9e076, #ffb703, #f9e076);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px #ffaa00;
      margin: 15px 0 5px;
      transform: translateZ(15px);
    }

    .name-highlight {
      font-size: 2.5rem;
      font-weight: 800;
      color: #ffd966;
      text-shadow: 0 0 35px gold;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .age-badge {
      display: inline-block;
      background: rgba(255,215,0,0.25);
      backdrop-filter: blur(10px);
      padding: 8px 25px;
      border-radius: 40px;
      font-size: 2rem;
      font-weight: 800;
      color: #ffd966;
      border: 2px solid gold;
      margin: 10px 0 15px;
      box-shadow: 0 0 30px gold;
      transform: translateZ(12px);
    }

    .message {
      font-size: 1.5rem;
      line-height: 1.9;
      color: #f8f0e3;
      text-shadow: 0 5px 15px black;
      background: rgba(0,0,0,0.3);
      padding: 15px 20px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      transform: translateZ(10px);
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(40px) rotateX(-10deg); }
      100% { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    .confetti {
      position: absolute;
      font-size: 2rem;
      animation: confettiFall 4s linear forwards;
      z-index: 100;
      pointer-events: none;
      text-shadow: 0 0 15px currentColor;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20vh) rotate(0deg) scale(0.8); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(1080deg) scale(0.2); opacity: 0; }
    }

    .sound-toggle {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 2px solid gold;
      cursor: pointer;
      box-shadow: 0 0 25px gold;
      transition: 0.2s;
    }
    .sound-toggle:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="particles" id="particlesContainer"></div>

  <div class="sound-toggle" id="soundToggle" onclick="toggleMusic()" title="كتم / تشغيل الموسيقى">🔊</div>

  <div class="container">
    <!-- بطاقة تسجيل الدخول -->
    <div class="card" id="loginCard">
      <h2 class="login-title">🐱 مرحباً يا محمد أمين</h2>
      <p class="login-sub">أدخل كلمة السر لترى مفاجأتك</p>
      <div class="input-wrapper">
        <input type="password" id="passwordInput" placeholder="كلمة السر" autocomplete="off">
      </div>
      <button class="btn-3d" onclick="checkPassword()">🎈 افتح المفاجأة</button>
      <p style="margin-top:15px; opacity:0.7; font-size:0.9rem;">🎵 موسيقى Happy Party في الانتظار</p>
    </div>

    <!-- قسم المفاجأة -->
    <div id="surprise">
      <div class="card" style="transform: rotateY(0deg) rotateX(3deg);">
        <div class="cats-meme-gallery">
          <img src="https://i.imgur.com/2JkC8Fm.jpg" alt="قطة تحتفل" class="cat-meme" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2285%22 height=%2285%22%3E%3Ccircle cx=%2242%22 cy=%2242%22 r=%2240%22 fill=%22%23ffb6c1%22/%3E%3Ctext x=%2242%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2230%22%3E🐱%3C/text%3E%3C/svg%3E'">
          <img src="https://i.imgur.com/3nQmY5C.jpg" alt="قطة مع بالون" class="cat-meme" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2285%22 height=%2285%22%3E%3Ccircle cx=%2242%22 cy=%2242%22 r=%2240%22 fill=%22%23ffd700%22/%3E%3Ctext x=%2242%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2230%22%3E🎈%3C/text%3E%3C/svg%3E'">
          <img src="https://i.imgur.com/Qy8L0Np.jpg" alt="قطة كعكة" class="cat-meme" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2285%22 height=%2285%22%3E%3Ccircle cx=%2242%22 cy=%2242%22 r=%2240%22 fill=%22%23ff9f1c%22/%3E%3Ctext x=%2242%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2230%22%3E🎂%3C/text%3E%3C/svg%3E'">
          <img src="https://i.imgur.com/7kYqW4m.jpg" alt="قطة ترقص" class="cat-meme" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2285%22 height=%2285%22%3E%3Ccircle cx=%2242%22 cy=%2242%22 r=%2240%22 fill=%22%23e67e22%22/%3E%3Ctext x=%2242%22 y=%2250%22 text-anchor=%22middle%22 font-size=%2230%22%3E💃%3C/text%3E%3C/svg%3E'">
        </div>

        <h1 class="birthday-title">🎉 عيد ميلاد سعيد 🎂</h1>
        <div class="name-highlight">محمد أمين كشيدي</div>
        
        <div class="age-badge">✨ 17 سنة ✨</div>

        <p class="message">
          مبروك وصولك لعمر 17 🌹<br>
          كل عام وأنت بألف خير 🎈<br>
          أتمنى لك السعادة والنجاح<br>
          والصحة الدائمة 🐱💖<br>
          <span style="font-size:1.8rem;">🎊🎁🥳</span>
        </p>
        <p style="margin-top:20px; color:#ffd966; font-weight:bold;">🎵 HAPPY PARTY TO YOU! 🎵</p>
      </div>
    </div>
  </div>

  <!-- مشغل يوتيوب مخفي (سيتم استخدام الرابط المباشر للموسيقى) -->
  <div id="youtube-player" style="display:none;"></div>

  <script>
    // إنشاء جسيمات
    function createParticles() {
      const container = document.getElementById('particlesContainer');
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = 5 + Math.random() * 10 + 's';
        container.appendChild(p);
      }
    }
    createParticles();

    // تحميل يوتيوب API للتحكم بالموسيقى
    let player;
    let musicPlaying = false;
    const soundToggle = document.getElementById('soundToggle');

    // تحميل API يوتيوب
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('youtube-player', {
        height: '0',
        width: '0',
        videoId: 'HgamJLTR0-4', // المعرف من الرابط
        playerVars: {
          'autoplay': 0,
          'controls': 0,
          'loop': 1,
          'playlist': 'HgamJLTR0-4',
          'mute': 0,
          'rel': 0,
          'showinfo': 0
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      console.log("المشغل جاهز");
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        musicPlaying = true;
        soundToggle.innerHTML = '🔊';
        soundToggle.style.boxShadow = '0 0 25px gold';
      } else if (event.data === YT.PlayerState.PAUSED) {
        musicPlaying = false;
        soundToggle.innerHTML = '🔇';
        soundToggle.style.boxShadow = '0 0 15px gray';
      }
    }

    function toggleMusic() {
      if (player && player.playVideo) {
        if (musicPlaying) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      }
    }

    // دالة التحقق من كلمة المرور (17)
    function checkPassword() {
      const pass = document.getElementById('passwordInput').value.trim();
      const loginCard = document.getElementById('loginCard');
      const surprise = document.getElementById('surprise');

      if (pass === "17") {
        loginCard.style.transition = '0.5s';
        loginCard.style.opacity = '0';
        loginCard.style.transform = 'rotateY(15deg) rotateX(10deg) scale(0.9)';
        
        setTimeout(() => {
          loginCard.style.display = 'none';
          surprise.style.display = 'block';
          
          // تشغيل الموسيقى تلقائياً
          if (player && player.playVideo) {
            player.playVideo();
          }
          
          launchConfetti();
        }, 400);
      } else {
        alert("❌ كلمة المرور غير صحيحة! (تلميح: عمرك الجديد)");
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    function launchConfetti() {
      const emojis = ["🎉","🎊","✨","🎈","🎂","🐱","😻","🥳","🎁","💫","🍰","🎵","1️⃣7️⃣"];
      for (let i = 0; i < 140; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDuration = (2.5 + Math.random() * 5) + 's';
        c.style.fontSize = (1.4 + Math.random() * 2.8) + 'rem';
        c.style.animationDelay = Math.random() * 0.9 + 's';
        document.body.appendChild(c);
        setTimeout(() => { if(c.parentNode) c.remove(); }, 5500);
      }
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    window.addEventListener('load', () => {
      document.getElementById('passwordInput').focus();
    });

    // تعريف الدالة الشاملة لـ onYouTubeIframeAPIReady
    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
  </script>
</body>
</html>
