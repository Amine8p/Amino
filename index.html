<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة طلب منتج</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f7f6; 
            text-align: center; 
        }
        .form-container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: inline-block; 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box; 
        }
        h2 { color: #333; margin-bottom: 20px; }
        label { display: block; text-align: right; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, textarea { 
            display: block; 
            width: 100%; 
            margin-bottom: 15px; 
            padding: 12px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            background-color: #ff5722; 
            color: white; 
            cursor: pointer; 
            border: none; 
            font-weight: bold; 
            width: 100%; 
            padding: 12px; 
            font-size: 18px; 
            border-radius: 5px; 
            transition: 0.3s; 
        }
        button:hover { background-color: #e64a19; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>استمارة طلب جديدة 🛒</h2>
        
        <!-- تم ربط النموذج ببريدك الإلكتروني مباشرة بالأسفل -->
        <form action="https://formsubmit.co/mohj7405@gmail.com" method="POST">
            
            <!-- 1. نوعية الطلبية -->
            <label for="order_type">نوعية الطلبية (المنتج):</label>
            <input type="text" id="order_type" name="نوعية_الطلبية" placeholder="مثال: حذاء رياضي، قميص..." required>
            
            <!-- 2. الكمية -->
            <label for="quantity">الكمية المطلوبة:</label>
            <input type="number" id="quantity" name="الكمية" min="1" value="1" required>
            
            <!-- 3. رقم الهاتف -->
            <label for="phone">رقم الهاتف لتأكيد الطلب:</label>
            <input type="tel" id="phone" name="رقم_الهاتف" placeholder="مثال: 06XXXXXXXX" required>
            
            <!-- 4. مكان التوصيل -->
            <label for="address">مكان التوصيل (العنوان والولاية):</label>
            <textarea id="address" name="مكان_التوصيل" rows="3" placeholder="اكتب عنوانك بالتفصيل هنا..." required></textarea>
            
            <!-- إلغاء كابتشا التفعيل المزعجة للزبائن بعد أول تفعيل -->
            <input type="hidden" name="_captcha" value="false">

            <!-- زر الإرسال -->
            <button type="submit">تأكيد إرسال الطلبية</button>
        </form>
    </div>

</body>
</html>
